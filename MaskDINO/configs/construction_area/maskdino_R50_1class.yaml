_BASE_: ../coco/instance-segmentation/maskdino_R50_bs16_50ep_3s.yaml

DATASETS:
  TRAIN: ("construction_area_train",)
  TEST: ("construction_area_val",)

MODEL:
  SEM_SEG_HEAD:
    NUM_CLASSES: 1

