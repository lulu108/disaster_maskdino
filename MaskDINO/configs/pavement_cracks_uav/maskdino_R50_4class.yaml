_BASE_: ../coco/instance-segmentation/maskdino_R50_bs16_50ep_3s.yaml

DATASETS:
  TRAIN: ("pavement_cracks_uav_train_repeat_thin",)
  TEST: ("pavement_cracks_uav_val",)

MODEL:
  SEM_SEG_HEAD:
    NUM_CLASSES: 4
  MaskDINO:
    MASK_WEIGHT: 6.0
    DICE_WEIGHT: 6.0
    COST_MASK_WEIGHT: 6.0
    COST_DICE_WEIGHT: 6.0
    NUM_OBJECT_QUERIES: 100
    TRAIN_NUM_POINTS: 4096
    DN_NUM: 50

INPUT:
  DATASET_MAPPER_NAME: "coco_instance_detr"
  MIN_SIZE_TRAIN: (640, 672, 704, 736, 768, 800)
  MIN_SIZE_TRAIN_SAMPLING: "choice"
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333
  CROP:
    ENABLED: True
    TYPE: "absolute_range"
    SIZE: [640, 640]

DATALOADER:
  FILTER_EMPTY_ANNOTATIONS: False

SOLVER:
  IMS_PER_BATCH: 1
  BASE_LR: 0.00000625
  MAX_ITER: 60000
  STEPS: (48000, 55000)
  CHECKPOINT_PERIOD: 10000

TEST:
  EVAL_PERIOD: 5000

OUTPUT_DIR: "output/pavement_cracks_uav_r50_multiscale800_crop640_maskdice6_repeatthin"
